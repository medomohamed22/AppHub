<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6d28d9">
  <meta name="description" content="شبكة اجتماعية متوافقة مع Pi Network">
  <title>Meshora — مجتمعك على Pi</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script defer src="/app.js"></script>
</head>
<body class="landing-body" data-page="login">
  <main class="landing-shell">
    <section class="hero-card">
      <div class="brand brand-large">
        <span class="brand-mark">π</span>
        <span>Meshora</span>
      </div>
      <span class="eyebrow">مجتمع Web3 داخل Pi Browser</span>
      <h1>شارك أفكارك، كوّن مجتمعك، وروّج منشوراتك باستخدام Pi.</h1>
      <p class="hero-copy">تجربة اجتماعية سريعة، آمنة، ومصممة للهواتف أولًا.</p>

      <div class="feature-grid">
        <div class="feature"><strong>حساب Pi</strong><span>دخول مباشر وآمن</span></div>
        <div class="feature"><strong>محتوى اجتماعي</strong><span>منشورات وتفاعل</span></div>
        <div class="feature"><strong>ترويج بـ Pi</strong><span>حملات واضحة</span></div>
      </div>

      <button id="loginButton" class="primary-button large-button" type="button">
        <span class="button-icon">π</span>
        <span>الدخول باستخدام Pi</span>
      </button>
      <p id="loginStatus" class="status-text" aria-live="polite"></p>
      <p class="fine-print">بالمتابعة أنت توافق على شروط الاستخدام وسياسة الخصوصية.</p>
    </section>
  </main>
</body>
</html>
