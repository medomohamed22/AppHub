<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>الرئيسية — Meshora</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script defer src="/app.js"></script>
</head>
<body data-page="feed">
  <header class="topbar">
    <a class="brand" href="/app"><span class="brand-mark">π</span><span>Meshora</span></a>
    <div class="top-actions">
      <button id="refreshButton" class="icon-button" type="button" aria-label="تحديث">↻</button>
      <a class="avatar-link" href="/profile"><span id="topAvatar" class="avatar avatar-small">P</span></a>
    </div>
  </header>

  <main class="page-grid">
    <aside class="side-panel desktop-only">
      <a class="side-link active" href="/app">⌂ الرئيسية</a>
      <a class="side-link" href="/profile">◎ ملفي الشخصي</a>
      <a class="side-link" href="/promote">⚡ الترويج</a>
      <button id="logoutButton" class="side-link danger-link" type="button">⇥ تسجيل الخروج</button>
    </aside>

    <section class="feed-column">
      <article class="composer card">
        <div class="composer-row">
          <span id="composerAvatar" class="avatar">P</span>
          <textarea id="postContent" maxlength="1000" placeholder="ماذا يدور في بالك؟"></textarea>
        </div>
        <div class="composer-footer">
          <label class="file-button">
            <input id="postImage" type="file" accept="image/jpeg,image/png,image/webp">
            <span>▧ صورة</span>
          </label>
          <span id="imageName" class="muted-text"></span>
          <button id="publishButton" class="primary-button" type="button">نشر</button>
        </div>
        <p id="composerStatus" class="status-text" aria-live="polite"></p>
      </article>

      <div id="feedStatus" class="loading-state">جاري تحميل المنشورات…</div>
      <section id="feedList" class="post-list" aria-live="polite"></section>
      <button id="loadMoreButton" class="secondary-button full-button hidden" type="button">تحميل المزيد</button>
    </section>

    <aside class="right-panel desktop-only">
      <div class="card compact-card">
        <h2>ترويج سريع</h2>
        <p>اجعل منشورك يصل لعدد أكبر من مستخدمي المجتمع.</p>
        <a class="primary-button full-button" href="/promote">ابدأ حملة</a>
      </div>
      <div class="card compact-card">
        <h2>قواعد المجتمع</h2>
        <p>احترم الآخرين، لا تنشر محتوى مضللًا، ولا تستخدم المنصة للسبام.</p>
      </div>
    </aside>
  </main>

  <nav class="bottom-nav mobile-only">
    <a class="active" href="/app"><span>⌂</span><small>الرئيسية</small></a>
    <a href="/promote"><span>⚡</span><small>ترويج</small></a>
    <a href="/profile"><span>◎</span><small>حسابي</small></a>
  </nav>
</body>
</html>
