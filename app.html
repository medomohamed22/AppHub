<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>AppHub</title><script defer src="https://sdk.minepi.com/pi-sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--p:#6d3fe6;--pd:#3f1f9c;--p-soft:#efe9ff;--ink:#181527;--mut:#84809333;--mut2:#84809d;--line:#eae7f4;--bg:#fff;--blue:#1889e6;--r-lg:22px;--r-md:16px;--font-d:'Sora',system-ui,sans-serif;--font-b:'Inter',system-ui,sans-serif;--font-m:'JetBrains Mono',monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-b);-webkit-font-smoothing:antialiased}
h1,h2{font-family:var(--font-d)}
.top{position:sticky;top:0;z-index:20;background:#fffffff2;border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}
.topin{max-width:900px;margin:auto;height:60px;padding:0 16px;display:grid;grid-template-columns:40px minmax(0,1fr) 40px;align-items:center}
.iconBtn{width:38px;height:38px;display:grid;place-items:center;border:0;background:var(--p-soft);border-radius:50%;color:var(--pd);transition:.15s}
.iconBtn:active{transform:scale(.92)}
.iconBtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.siteBrand{display:inline-flex;align-items:center;justify-content:center;min-width:0;width:min(210px,100%);height:42px;text-decoration:none}
.siteBrandLogo{display:block;width:100%;height:100%;object-fit:contain;object-position:center}
@media(max-width:420px){.siteBrand{width:min(150px,100%);height:35px}}

.miniBrand{display:flex;align-items:center;justify-content:center;gap:9px;min-width:0;font-weight:700;font-family:var(--font-d)}
.miniBrand img{width:28px;height:28px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
.miniBrand span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page{max-width:900px;margin:auto;padding:22px 16px 56px}
.appHead{display:grid;grid-template-columns:96px minmax(0,1fr) auto;gap:16px;align-items:center;padding:6px 0 24px}
.appLogo{width:96px;height:96px;border-radius:26px;object-fit:cover;border:1px solid var(--line);box-shadow:0 10px 26px -12px rgba(31,14,79,.28)}
.appName{font-size:25px;line-height:1.12;margin:0 0 7px;letter-spacing:-.02em}
.tagline{margin:0;color:var(--mut2);line-height:1.5;font-size:13.5px}
.network{display:inline-flex;margin-top:10px;border-radius:999px;padding:5px 10px;background:#dcf7ed;border:1px solid #a5e1cd;color:#15936a;font-size:10.5px;font-family:var(--font-m);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.network.testnet{background:#fff2d9;border-color:#efd49d;color:#bf821c}
.get{border:0;background:linear-gradient(135deg,#2d99f2,var(--blue));color:#fff;border-radius:999px;padding:12px 24px;font-size:15.5px;font-weight:750;box-shadow:0 10px 22px -10px #1889e666}
.get:active{transform:scale(.96)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:0 -16px 26px;padding:16px}
.stat{text-align:center;border-right:1px solid var(--line);padding:3px 7px;min-width:0}
.stat:last-child{border-right:0}
.stat small{display:block;color:#a29fb0;font-size:9px;text-transform:uppercase;font-weight:700;letter-spacing:.06em;font-family:var(--font-m)}
.stat b{display:block;margin-top:5px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stars{color:#1389e8;letter-spacing:-1px;font-size:12px}
.section{padding:20px 0;border-bottom:1px solid var(--line)}
.section h2{font-size:18px;margin:0 0 10px;letter-spacing:-.01em}
.section p{font-size:14.5px;line-height:1.65;margin:0;color:#3a3648}
.version{color:#a29fb0;font-size:11.5px;margin-bottom:8px;font-family:var(--font-m)}
.screens{display:flex;align-items:flex-start;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 2px 12px}
.screens img{display:block;width:min(76vw,340px);height:auto;object-fit:contain;border-radius:20px;border:1px solid var(--line);scroll-snap-align:start;flex:0 0 auto;background:#f2f2f6;box-shadow:0 10px 24px -14px rgba(31,14,79,.22)}
.infoRow{display:flex;justify-content:space-between;gap:18px;padding:14px 0;border-bottom:1px solid #f1eff6;font-size:13.5px}
.infoRow:last-child{border-bottom:0}
.infoRow span:first-child{color:#a29fb0}
.infoRow span:last-child{text-align:right;font-weight:600}
.link{color:var(--blue);text-decoration:none;font-weight:700}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.chip{padding:7px 13px;border-radius:999px;background:var(--p-soft);color:var(--pd);font-size:11.5px;font-weight:600}
.loading,.error{padding:90px 20px;text-align:center;color:var(--mut2);font-size:14px}.verified{display:inline-flex;align-items:center;gap:5px;margin-left:7px;color:#0f9e73;font-size:11px;font-weight:800}.ratingBox{background:#faf9fc;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px}.ratingStars{display:flex;gap:6px;margin:12px 0}.starBtn{border:0;background:transparent;padding:2px;font-size:30px;color:#d8d5df;line-height:1}.starBtn.active{color:#1389e8}.smallBtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-weight:700;color:var(--ink)}.reportForm{display:none;margin-top:12px}.reportForm.open{display:grid;gap:9px}.reportForm select,.reportForm textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff}.reportForm textarea{min-height:80px;resize:vertical}.notice{font-size:12px;color:var(--mut2)}
@media(max-width:620px){
  .page{padding:16px 12px 44px}
  .appHead{grid-template-columns:78px minmax(0,1fr) auto;gap:12px}
  .appLogo{width:78px;height:78px;border-radius:20px}
  .appName{font-size:20px}
  .tagline{font-size:12.5px}
  .get{padding:10px 18px;font-size:14px}
  .stats{margin-left:-12px;margin-right:-12px;padding-left:10px;padding-right:10px}
  .screens img{width:80vw;height:auto}
  .stat b{font-size:12.5px}
}

/* v16 responsive, performance and loading UX */
html{scroll-behavior:smooth;text-size-adjust:100%}
body{min-height:100dvh;overflow-x:hidden}
img{max-width:100%;content-visibility:auto}
button,a,input,select,textarea{-webkit-tap-highlight-color:transparent}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid color-mix(in srgb,var(--p,#6d3fe6) 28%,transparent);outline-offset:2px}
.app-loading-bar{position:fixed;z-index:9999;top:0;left:0;height:3px;width:100%;pointer-events:none;opacity:0;transition:opacity .2s;background:linear-gradient(90deg,transparent,var(--p,#6d3fe6),#a887ff,transparent);background-size:220% 100%;animation:loadingSlide 1s linear infinite}
.app-loading-bar.show{opacity:1}
.page-loader{position:fixed;inset:0;z-index:9998;display:grid;place-items:center;background:color-mix(in srgb,var(--bg,#f5f3fb) 92%,white);transition:opacity .28s,visibility .28s}
.page-loader.hide{opacity:0;visibility:hidden}
.loader-card{display:grid;justify-items:center;gap:13px;padding:24px;color:var(--ink-soft,#4c4760);font-weight:700;font-size:13px}
.loader-orbit{width:52px;height:52px;border-radius:50%;border:4px solid color-mix(in srgb,var(--p,#6d3fe6) 15%,transparent);border-top-color:var(--p,#6d3fe6);animation:spin .75s linear infinite;box-shadow:0 8px 28px -12px rgba(63,31,156,.4)}
.is-busy{position:relative;pointer-events:none;opacity:.78}
.is-busy::after{content:"";display:inline-block;width:14px;height:14px;margin-inline-start:8px;vertical-align:-2px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .65s linear infinite}
.skeleton{position:relative;overflow:hidden;background:color-mix(in srgb,var(--line,#e9e5f4) 66%,white);border-radius:14px;min-height:84px}
.skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.75),transparent);animation:shimmer 1.25s infinite}
.skeleton-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{100%{transform:translateX(100%)}}
@keyframes loadingSlide{to{background-position:-220% 0}}
@media(max-width:719px){
  .topin{padding-inline:max(12px,env(safe-area-inset-left)) max(12px,env(safe-area-inset-right))}
  .page,.wrap{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
  .hero{border-radius:20px;padding:23px 18px}
  .hero h1{font-size:clamp(25px,9vw,34px)}
  .form{grid-template-columns:1fr!important}.field{grid-column:1/-1!important}
  .previewRow{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .row{flex-wrap:wrap}.row>.primary,.row>.ghost,.row>.danger{min-height:46px}
  .appRow{grid-template-columns:54px minmax(0,1fr) auto;gap:10px;padding:11px}
  .appRowLogo{width:54px;height:54px;border-radius:14px}.getBtn{padding:9px 13px;min-width:56px}
  .analytics{grid-template-columns:repeat(2,1fr)}
  .modalCard{width:min(100% - 16px,620px);max-height:calc(100dvh - 20px);overflow:auto;border-radius:20px}
  .bottom{padding-bottom:max(8px,env(safe-area-inset-bottom))}
  .navbtn{min-width:0;font-size:10px}.navbtn svg{width:21px;height:21px}
  .skeleton-grid{grid-template-columns:1fr}
}
@media(max-width:420px){
  .brand{font-size:16px}.mark{width:29px;height:29px}.login,.account{max-width:46vw;padding:9px 11px}
  .previewRow{gap:8px}.preview{border-radius:13px}
  .sectionTitle{align-items:flex-start;gap:8px}.sectionTitle h2{font-size:18px}
  .appHead{grid-template-columns:72px minmax(0,1fr)!important}.appHead>.get{grid-column:1/-1;width:100%;margin-top:2px}
  .stats{grid-template-columns:repeat(2,1fr)!important}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.loader-orbit,.app-loading-bar,.skeleton::after,.is-busy::after{animation-duration:1.5s}}

</style>
</head>
<body><div class="app-loading-bar" id="appLoadingBar" aria-hidden="true"></div><div class="page-loader" id="pageLoader" role="status" aria-live="polite"><div class="loader-card"><div class="loader-orbit"></div><span>Loading AppHub…</span></div></div>
<header class="top"><div class="topin"><button class="iconBtn" onclick="history.length>1?history.back():location.href='index.html'" aria-label="Back"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg></button><a class="siteBrand" href="/" aria-label="AppHub home"><img class="siteBrandLogo" src="/assets/site-logo.png" alt="AppHub"></a><button class="iconBtn" onclick="location.href='index.html'" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button></div></header>
<main id="content"><div class="loading">Loading app…</div></main>
<script>
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const API={apps:'/api/apps',interaction:'/api/app-interactions',myRating:'/api/app-interactions',login:'/api/pi-login'};
let auth=JSON.parse(localStorage.getItem('apphub_auth')||'null'),currentApp=null,currentUrl='#',userStars=0;
function safeUrl(value){try{const u=new URL(value);return ['http:','https:'].includes(u.protocol)?u.href:'#'}catch{return '#'}}
function headers(){return{'Content-Type':'application/json',...(auth?.token?{Authorization:'Bearer '+auth.token}:{})}}
function visitorId(){let id=localStorage.getItem('apphub_visitor_id');if(!id){id=(crypto.randomUUID?.()||Date.now()+'-'+Math.random()).replace(/[^a-zA-Z0-9_-]/g,'');localStorage.setItem('apphub_visitor_id',id)}return id}
async function login(){if(!window.Pi)throw new Error('Open inside Pi Browser to sign in');const result=await Pi.authenticate(['username'],p=>console.warn('Incomplete payment',p));const r=await fetch(API.login,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:result.accessToken})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Sign-in failed');auth=d;localStorage.setItem('apphub_auth',JSON.stringify(auth));return auth}
async function ensureAuth(){if(auth?.token)return auth;return login()}
async function interact(action,extra={}){const r=await fetch(API.interaction,{method:'POST',headers:headers(),body:JSON.stringify({action,appId:currentApp.id,...extra})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to save');return d}
function starsHtml(){return [1,2,3,4,5].map(n=>`<button class="starBtn ${n<=userStars?'active':''}" onclick="rate(${n})" aria-label="${n} stars">★</button>`).join('')}
async function rate(stars){try{await ensureAuth();const d=await interact('rate',{stars});userStars=stars;currentApp.rating=d.rating.rating;currentApp.ratings_count=d.rating.ratings_count;document.getElementById('ratingValue').textContent=Number(currentApp.rating||0).toFixed(1);document.getElementById('ratingsCount').textContent=Number(currentApp.ratings_count||0)+' ratings';document.getElementById('ratingStars').innerHTML=starsHtml();document.getElementById('ratingNote').textContent='Your rating was saved.'}catch(e){document.getElementById('ratingNote').textContent=e.message}}
function toggleReport(){document.getElementById('reportForm').classList.toggle('open')}
async function submitReport(){try{await ensureAuth();const reason=document.getElementById('reportReason').value,details=document.getElementById('reportDetails').value;await interact('report',{reason,details});document.getElementById('reportNote').textContent='Report submitted for admin review.';document.getElementById('reportForm').classList.remove('open')}catch(e){document.getElementById('reportNote').textContent=e.message}}
async function loadMyRating(){if(!auth?.token)return;try{const r=await fetch(API.myRating+'?appId='+encodeURIComponent(currentApp.id),{headers:headers()}),d=await r.json();if(r.ok){userStars=d.stars||0;document.getElementById('ratingStars').innerHTML=starsHtml()}}catch{}}
async function load(){
 const id=new URLSearchParams(location.search).get('id');if(window.Pi)Pi.init({version:'2.0',sandbox:false});
 if(!id){content.innerHTML='<div class="error">App not found.</div>';return}
 try{const r=await fetch(API.apps),d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to load app');const a=(d.apps||[]).find(x=>String(x.id)===id);if(!a)throw new Error('This app is unavailable or not published.');currentApp=a;document.title=a.name+' · AppHub';const shots=(a.screenshot_urls||[]).slice(0,3);currentUrl=safeUrl(a.website_url);content.innerHTML=`<div class="page">
 <section class="appHead"><img class="appLogo" src="${esc(a.icon_url)}" alt="${esc(a.name)} logo"><div><h1 class="appName">${esc(a.name)} ${a.is_verified?'<span class="verified">✓ Verified</span>':''}</h1><p class="tagline">${esc(a.short_description||'Discover this Pi application.')}</p><span class="network ${a.network==='testnet'?'testnet':''}">${esc(a.network||'mainnet')}</span></div><button class="get" onclick="openWebsite()">Get</button></section>
 <section class="stats"><div class="stat"><small>Rating</small><b id="ratingValue">${Number(a.rating||0).toFixed(1)}</b><div class="stars">★★★★★</div></div><div class="stat"><small>Ratings</small><b id="ratingsCount">${Number(a.ratings_count||0)} ratings</b></div><div class="stat"><small>Views</small><b id="viewsCount">${Number(a.views_count||0)}</b></div><div class="stat"><small>Get clicks</small><b id="clicksCount">${Number(a.get_clicks_count||0)}</b></div></section>
 <section class="ratingBox"><h2 style="margin:0;font-size:18px">Rate this app</h2><div id="ratingStars" class="ratingStars">${starsHtml()}</div><div id="ratingNote" class="notice">Sign in with Pi and choose 1–5 stars. You can change your rating.</div></section>
 <section class="section"><h2>What's New</h2><div class="version">Latest version · Recently updated</div><p>${esc(a.name)} is available on AppHub.</p></section>
 <section class="section"><h2>Preview</h2><div class="screens">${shots.map(x=>`<img src="${esc(x)}" alt="${esc(a.name)} screenshot">`).join('')}</div><p>${esc(a.short_description||'')}</p></section>
 <section class="section"><h2>Information</h2><div class="infoRow"><span>Provider</span><span>${esc(a.developer_name||'Developer')}</span></div><div class="infoRow"><span>Category</span><span>${esc(a.category||'App')}</span></div><div class="infoRow"><span>Compatibility</span><span>Any Device</span></div><div class="infoRow"><span>Network</span><span>${esc(a.network||'Mainnet')}</span></div><div class="infoRow"><span>Verification</span><span>${a.is_verified?'AppHub Verified':'Not verified'}</span></div><div class="infoRow"><span>Developer Website</span><a class="link" href="${esc(currentUrl)}" target="_blank" rel="noopener">Open ↗</a></div><div class="chips"><span class="chip">${esc(a.category||'App')}</span><span class="chip">Pi Ecosystem</span><span class="chip">Web3</span></div></section>
 <section class="section"><h2>Report this app</h2><p class="notice">Report broken, misleading or inappropriate applications to the AppHub team.</p><button class="smallBtn" onclick="toggleReport()">Report app</button><div id="reportForm" class="reportForm"><select id="reportReason"><option value="not_working">App is not working</option><option value="scam">Scam or misleading</option><option value="wrong_link">Wrong or unsafe link</option><option value="impersonation">Impersonation</option><option value="inappropriate">Inappropriate content</option><option value="other">Other</option></select><textarea id="reportDetails" maxlength="500" placeholder="Optional details"></textarea><button class="get" onclick="submitReport()">Submit report</button></div><div id="reportNote" class="notice"></div></section>
 </div>`;
 await interact('view',{visitorId:visitorId()}).then(d=>{if(d.counts)document.getElementById('viewsCount').textContent=d.counts.views_count}).catch(()=>{});await loadMyRating();
 }catch(e){content.innerHTML=`<div class="error">${esc(e.message||'Unable to load app.')}</div>`}
}
async function openWebsite(){if(!currentApp||currentUrl==='#')return;try{const d=await interact('get_click',{visitorId:visitorId()});if(d.counts)document.getElementById('clicksCount').textContent=d.counts.get_clicks_count}catch{}open(currentUrl,'_blank','noopener')}
load();
</script>

<script>
(function(){
  const bar=document.getElementById('appLoadingBar');
  const loader=document.getElementById('pageLoader');
  let pending=0;
  const show=()=>{pending++;bar&&bar.classList.add('show')};
  const hide=()=>{pending=Math.max(0,pending-1);if(!pending)bar&&bar.classList.remove('show')};
  const originalFetch=window.fetch.bind(window);
  window.fetch=async function(){show();try{return await originalFetch(...arguments)}finally{hide()}};
  window.addEventListener('load',()=>setTimeout(()=>loader&&loader.classList.add('hide'),120));
  setTimeout(()=>loader&&loader.classList.add('hide'),4500);
  document.addEventListener('click',e=>{
    const btn=e.target.closest('button[type="submit"],button.primary,.get,.login,.account');
    if(!btn||btn.disabled||btn.classList.contains('navbtn'))return;
    btn.classList.add('is-busy');
    setTimeout(()=>btn.classList.remove('is-busy'),5000);
  });
  document.addEventListener('load',e=>{if(e.target instanceof HTMLImageElement)e.target.classList.add('image-ready')},true);
  document.querySelectorAll('img').forEach(img=>{if(!img.loading)img.loading='lazy';img.decoding='async'});
})();
</script>

</body></html>
