<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>ترويج منشور — Meshora</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script defer src="/app.js"></script>
</head>
<body data-page="promote">
  <header class="topbar">
    <a class="back-link" href="/app">→</a>
    <strong>ترويج منشور</strong>
    <span></span>
  </header>
  <main class="single-column">
    <section class="card">
      <h1>وصل منشورك لجمهور أكبر</h1>
      <p class="muted-text">اختر منشورًا وباقة. لن تُفعّل الحملة إلا بعد إكمال الدفع والتحقق منه على خوادم Pi.</p>

      <label>المنشور
        <select id="postSelect"><option value="">جاري التحميل…</option></select>
      </label>

      <div id="packagesList" class="package-grid"></div>
      <button id="payButton" class="primary-button large-button full-button" type="button" disabled>الدفع باستخدام Pi</button>
      <p id="paymentStatus" class="status-text" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>حملاتي</h2>
      <div id="campaignsList" class="campaign-list"></div>
    </section>
  </main>
  <nav class="bottom-nav mobile-only">
    <a href="/app"><span>⌂</span><small>الرئيسية</small></a>
    <a class="active" href="/promote"><span>⚡</span><small>ترويج</small></a>
    <a href="/profile"><span>◎</span><small>حسابي</small></a>
  </nav>
</body>
</html>
