<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>الملف الشخصي — Meshora</title>
  <link rel="stylesheet" href="/css/app.css">
  <script defer src="/app.js"></script>
</head>
<body data-page="profile">
  <header class="topbar">
    <a class="back-link" href="/app">→</a>
    <strong>الملف الشخصي</strong>
    <span></span>
  </header>
  <main class="single-column">
    <section class="profile-hero card">
      <div id="profileAvatar" class="avatar avatar-xl">P</div>
      <h1 id="profileName">...</h1>
      <p id="profileUsername" class="muted-text"></p>
      <p id="profileBio"></p>
      <button id="editProfileButton" class="secondary-button" type="button">تعديل الملف</button>
    </section>

    <section id="editPanel" class="card hidden">
      <h2>تعديل بياناتك</h2>
      <label>الاسم الظاهر<input id="displayNameInput" maxlength="50"></label>
      <label>نبذة<textarea id="bioInput" maxlength="160"></textarea></label>
      <button id="saveProfileButton" class="primary-button" type="button">حفظ</button>
      <p id="profileStatus" class="status-text"></p>
    </section>

    <h2 class="section-title">منشوراتي</h2>
    <section id="profilePosts" class="post-list"></section>
  </main>
  <nav class="bottom-nav mobile-only">
    <a href="/app"><span>⌂</span><small>الرئيسية</small></a>
    <a href="/promote"><span>⚡</span><small>ترويج</small></a>
    <a class="active" href="/profile"><span>◎</span><small>حسابي</small></a>
  </nav>
</body>
</html>
